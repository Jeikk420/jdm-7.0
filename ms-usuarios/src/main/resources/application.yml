spring:
  application:
    name: ms-usuarios
  datasource:
    # Si Railway no encuentra una variable, usará lo que está después de los dos puntos (localhost)
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/foro_usuarios_db}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  eureka:
    client:
      service-url:
        defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    instance:
      prefer-ip-address: true

server:
  # Railway suele inyectar una variable llamada PORT, si no, usa el 8081
  port: ${PORT:8081}