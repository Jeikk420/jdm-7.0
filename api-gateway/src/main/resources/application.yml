server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: ms-usuarios
          uri: lb://MS-USUARIOS
          predicates:
            - Path=/api/usuarios/**
          filters:
            - RewritePath=/api/usuarios/(?<remaining>.*), /api/usuarios/${remaining}

eureka:
  client:
    service-url:
      defaultZone: https://jdm-70-production.up.railway.app/eureka/
    register-with-eureka: true
    fetch-registry: true