server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: ms-usuarios
          # Usamos la ruta directa que ya comprobamos que funciona
          uri: https://imaginative-caring-production.up.railway.app
          predicates:
            - Path=/api/usuarios/**
          filters:
            # Este es el filtro básico que te pide la rúbrica y que evita el error 502
            - RemoveRequestHeader=Host

eureka:
  client:
    service-url:
      defaultZone: https://jdm-70-production.up.railway.app/eureka/
    register-with-eureka: true
    fetch-registry: true